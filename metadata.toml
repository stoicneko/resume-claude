language = "en"

[layout]
    awesome_color = "skyblue"
    before_section_skip = "1pt"
    before_entry_skip = "1pt"
    before_entry_description_skip = "1pt"
    paper_size = "a4"

    [layout.fonts]
        regular_fonts = ["Source Sans 3", "Source Sans Pro"]
        header_font = "Roboto"

    [layout.header]
        header_align = "left"
        display_profile_photo = false
        profile_photo_radius = "50%"
        info_font_size = "10pt"

    [layout.entry]
        display_entry_society_first = true
        display_logo = false

    [layout.footer]
        display_page_counter = false
        display_footer = true

[inject]
    inject_ai_prompt = false
    inject_keywords = true
    injected_keywords_list = ["SRE", "Kubernetes", "Docker", "Terraform", "Prometheus", "Grafana", "Go", "Python", "Linux", "CI/CD", "GitOps", "Observability", "Incident Response", "SLO", "SLI"]
    injected_ai_prompt_text = ""

[personal]
    first_name = "San"
    last_name = "Zhang"

    [personal.info]
        email = "san.zhang@example.com"
        phone = "+86 138-0000-1234"
        github = "zhangsan"
        linkedin = "sanzhang"
        location = "Beijing, China"

        [personal.info.custom-1]
            awesomeIcon = "weixin"
            text = "zhangsan_dev"
            link = ""

[lang.en]
    header_quote = "Senior SRE Engineer"
    cv_footer = "Curriculum Vitae"
    letter_footer = "Cover Letter"

[lang.zh]
    header_quote = "高级 SRE 工程师"
    cv_footer = "简历"
    letter_footer = "求职信"

[lang.non_latin]
    name = "张三"
    font = "Noto Sans CJK SC"
